<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문 관리자 백오피스</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; background: #0f172a; color: #e2e8f0; font-size: 14px; }

/* 로그인 */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #1e293b; border-radius: 16px; padding: 48px 40px; width: 360px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.login-card h1 { font-size: 22px; color: #fff; margin-bottom: 6px; }
.login-card p { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
.login-card input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px;
  color: #e2e8f0; font-size: 15px; font-family: inherit; margin-bottom: 12px; }
.login-card input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
.login-card button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.login-card button:hover { background: #2563eb; }
.login-err { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

/* 대시보드 */
#dashboard { display: none; }
.sidebar { width: 220px; background: #1e293b; min-height: 100vh; padding: 24px 0; position: fixed; left: 0; top: 0; bottom: 0; overflow-y: auto; }
.sidebar .logo { padding: 0 20px 24px; border-bottom: 1px solid #334155; margin-bottom: 16px; }
.sidebar .logo h2 { font-size: 15px; color: #fff; }
.sidebar .logo p { font-size: 12px; color: #64748b; margin-top: 2px; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #94a3b8; text-decoration: none;
  transition: all .15s; font-size: 14px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
.sidebar nav a:hover, .sidebar nav a.active { background: #334155; color: #fff; }
.sidebar nav a .icon { width: 20px; text-align: center; }
.main { margin-left: 220px; padding: 28px; min-height: 100vh; }

/* 탭 패널 */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* 카드 */
.card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.card-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #334155; }

/* 통계 카드 */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
.stat-card .val { font-size: 36px; font-weight: 700; color: #3b82f6; margin-bottom: 6px; }
.stat-card .val.green { color: #22c55e; }
.stat-card .val.amber { color: #f59e0b; }
.stat-card .lbl { font-size: 13px; color: #94a3b8; }

/* 차트 */
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 20px; }
.chart-box { background: #1e293b; border-radius: 12px; padding: 20px; }
.chart-box h3 { font-size: 14px; color: #94a3b8; margin-bottom: 14px; }
.chart-box canvas { max-height: 240px; }

/* 테이블 */
.tbl-wrap { overflow-x: auto; }
table.data-tbl { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
table.data-tbl th { background: #334155; color: #94a3b8; padding: 10px 12px; text-align: left; font-weight: 600; }
table.data-tbl td { padding: 9px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
table.data-tbl tbody tr:hover { background: #334155; }

/* 뱃지 */
.badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-green { background: #dcfce7; color: #15803d; }
.badge-amber { background: #fef3c7; color: #92400e; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-pink { background: #fce7f3; color: #9d174d; }

/* 버튼 */
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .15s; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-green { background: #15803d; color: #fff; }
.btn-green:hover { background: #166534; }
.btn-gray { background: #334155; color: #e2e8f0; }
.btn-gray:hover { background: #475569; }
.btn-red { background: #dc2626; color: #fff; }
.btn-red:hover { background: #b91c1c; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* 폼 */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155;
  border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; }
.form-group input:focus, .form-group select:focus { outline: 2px solid #3b82f6; border-color: transparent; }
.form-hint { font-size: 12px; color: #64748b; margin-top: 4px; }

/* 링크 박스 */
.link-box { background: #0f172a; border: 1px solid #3b82f6; border-radius: 8px; padding: 12px 16px;
  font-size: 13px; color: #60a5fa; word-break: break-all; margin: 12px 0; }

/* 결과 상세 */
.result-header { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.result-info { background: #0f172a; border-radius: 8px; padding: 16px; flex: 1; min-width: 160px; }
.result-info .label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
.result-info .value { font-size: 16px; font-weight: 700; color: #f1f5f9; }

.child-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.child-tab-btn { padding: 7px 18px; border-radius: 6px; border: 1px solid #334155; background: transparent; color: #94a3b8;
  cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
.child-tab-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

table.result-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.result-tbl th { background: #334155; color: #94a3b8; padding: 8px 10px; text-align: center; }
table.result-tbl th.q-th { text-align: left; }
table.result-tbl td { padding: 8px 10px; border-bottom: 1px solid #334155; color: #cbd5e1; text-align: center; }
table.result-tbl td.q-td { text-align: left; max-width: 380px; }
.score-bar { background: #1e3a5f; border-radius: 4px; height: 14px; }
.score-fill { background: #3b82f6; border-radius: 4px; height: 14px; }

.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.header-row h2 { font-size: 20px; color: #f1f5f9; }
.loading { color: #64748b; text-align: center; padding: 40px; }
.err-box { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px 16px; color: #fca5a5; font-size: 13px; margin-top: 12px; display: none; }
.err-box.show { display: block; }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:16px">📊</div>
    <h1>설문 관리자</h1>
    <p>유아 디지털 역량 연구 백오피스</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="sidebar">
    <div class="logo">
      <h2>📊 설문 관리자</h2>
      <p>유아 디지털 역량 연구</p>
    </div>
    <nav>
      <a class="active" onclick="showTab('overview')" id="nav-overview"><span class="icon">🏠</span> 개요</a>
      <a onclick="showTab('send')" id="nav-send"><span class="icon">📨</span> 설문 발송</a>
      <a onclick="showTab('tokens')" id="nav-tokens"><span class="icon">📋</span> 발송 목록</a>
    </nav>
    <div style="position:absolute;bottom:20px;left:0;right:0;padding:0 20px">
      <button class="btn btn-green" style="width:100%" onclick="exportCSV()">⬇ CSV 내보내기</button>
    </div>
  </div>

  <div class="main">

    <!-- 개요 탭 -->
    <div class="tab-panel active" id="tab-overview">
      <div class="header-row">
        <h2>개요</h2>
        <button class="btn btn-gray" onclick="loadStats()">↻ 새로고침</button>
      </div>
      <div class="stat-grid" id="statGrid"><div class="loading">데이터 불러오는 중...</div></div>
      <div class="chart-grid">
        <div class="chart-box"><h3>일별 발송 추이</h3><canvas id="trendChart"></canvas></div>
        <div class="chart-box"><h3>학교별 발송 현황</h3><canvas id="schoolChart"></canvas></div>
      </div>
    </div>

    <!-- 발송 탭 -->
    <div class="tab-panel" id="tab-send">
      <div class="header-row"><h2>설문 발송</h2></div>
      <div class="card" style="max-width:520px">
        <div class="card-title">새 설문 발송</div>
        <div class="form-group">
          <label>선생님 성함 *</label>
          <input type="text" id="sendName" placeholder="예: 김민지">
        </div>
        <div class="form-group">
          <label>학교(기관)명 *</label>
          <input type="text" id="sendSchool" placeholder="예: 행복유치원">
        </div>
        <div class="form-group">
          <label>학급명 *</label>
          <input type="text" id="sendGrade" placeholder="예: 5세 장미반">
        </div>
        <div class="form-group">
          <label>발송 방법 *</label>
          <select id="sendVia" onchange="toggleSendTo()">
            <option value="email">이메일</option>
            <option value="sms">문자 (링크 생성)</option>
          </select>
        </div>
        <div class="form-group">
          <label id="sentToLabel">이메일 주소 *</label>
          <input type="email" id="sendTo" placeholder="teacher@school.ac.kr">
          <p class="form-hint" id="sendToHint"></p>
        </div>
        <div class="err-box" id="sendErr"></div>
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="sendSurvey()">발송하기</button>
        <div id="sendResult" style="display:none;margin-top:16px">
          <p style="color:#22c55e;font-weight:600;margin-bottom:8px" id="sendResultMsg"></p>
          <div class="link-box" id="sendLink"></div>
          <button class="btn btn-gray btn-sm" onclick="copyLink()">링크 복사</button>
        </div>
      </div>
    </div>

    <!-- 발송 목록 탭 -->
    <div class="tab-panel" id="tab-tokens">
      <div class="header-row">
        <h2>발송 목록</h2>
        <button class="btn btn-gray" onclick="loadTokens()">↻ 새로고침</button>
      </div>
      <div class="card">
        <div class="tbl-wrap" id="tokenTbl"><div class="loading">불러오는 중...</div></div>
      </div>
    </div>

    <!-- 결과 상세 (오버레이) -->
    <div id="resultOverlay" style="display:none">
      <div class="header-row">
        <div>
          <h2 id="resultTitle">결과 상세</h2>
          <p style="color:#64748b;font-size:13px;margin-top:4px" id="resultSubtitle"></p>
        </div>
        <button class="btn btn-gray" onclick="closeResult()">← 목록으로</button>
      </div>
      <div id="resultContent"><div class="loading">불러오는 중...</div></div>
    </div>

  </div>
</div>

<script>
let adminPw = '';
let chartInstances = {};
let currentSendLink = '';

const QUESTIONS = [
  '유아는 디지털 기기와의 상호작용 속에서 새로운 놀이 방식이나 활동을 만들어내고 조율한다.',
  '유아는 디지털 기기의 다양한 반응을 탐색하며 새로운 사용 방식을 시도한다.',
  '유아는 디지털 기기를 활용하여 필요한 정보를 찾으려고 시도한다.',
  '유아는 디지털 기기에서 얻은 정보를 놀이에 반영하거나 확장한다.',
  '유아는 디지털 환경 속에서 자신이 알고 싶은 정보에 대해 질문하며 탐색한다.',
  '유아는 디지털 콘텐츠의 내용이 사실인지 의논하며 판단한다.',
  '유아는 디지털 콘텐츠에 대한 자신의 생각을 경험에 비추어 말하거나 비교해 본다.',
  '유아는 디지털 도구의 반응이나 기능을 탐색하며, 문제를 독창적으로 해결·조율한다.',
  '유아는 디지털 놀이 중 새로운 놀이 방식을 제안하거나 놀이를 확장한다.',
  '유아는 디지털 도구와의 상호작용 속에서 발생한 문제를 탐색하고 해결 방법을 구성한다.',
  '유아는 디지털 환경에서 기술과 함께 활동을 구성하고, 참여 과정을 주도하거나 확장한다.',
  '유아는 온·오프라인에서 자신의 의견이나 생각을 자신 있게 표현한다.',
  '유아는 디지털 도구를 사용하여 자신의 생각과 감정을 표현한다.',
  '유아는 디지털 환경에서 다양한 방식으로 소통한다.',
  '유아는 친구나 디지털 기기가 생성한 이미지나 소리의 의미를 이해하고 표현한다.',
  '디지털 환경에서 개인정보가 다른 사람의 권리와 연결되어 있음을 인식한다.',
  '유아는 개인정보 보호와 관련된 상황에서 규칙을 지키려 하며 이야기한다.',
  '유아는 자신의 개인정보를 디지털 공간에서 함부로 타인과 공유하지 않는다.',
  '유아는 타인의 개인정보를 조심스럽게 다룬다.',
  '유아는 디지털 기기의 응답 속도나 흐름에 맞춰 놀이를 유연하게 이어간다.',
  '유아는 디지털 놀이 중 사용 제한이나 종료 알림을 들으면 스스로 놀이를 멈춘다.',
  '유아는 디지털 공간에서 바르고 고운 말을 사용하려 한다.',
  '유아는 친구의 실수나 디지털 기기의 오작동을 너그럽게 받아들인다.',
  '유아는 디지털 놀이 시 친구와 서로 도와가며 참여한다.',
  '유아는 디지털 놀이 시 다른 사람들의 의견을 경청하고 자신의 생각과 조율하려 한다.',
  '유아는 디지털 활동 중 친구 또는 기기의 반응을 주의 깊게 관찰하고 공감이나 위로를 표현한다.'
];

const CHILD_LABELS = ['남아 1', '남아 2', '여아 1', '여아 2'];
const SCALE_LABELS = ['', '전혀 그렇지 않다', '그렇지 않다', '보통이다', '그렇다', '매우 그렇다'];
const CHART_COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899'];

// ── 로그인 ─────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  if (res.ok) {
    adminPw = pw;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadTokens();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

// ── 탭 전환 ────────────────────────────────────────────────────
function showTab(tabId) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  document.getElementById('nav-' + tabId).classList.add('active');
  document.getElementById('resultOverlay').style.display = 'none';
  if (tabId === 'tokens') loadTokens();
  if (tabId === 'overview') loadStats();
}

// ── 통계 ───────────────────────────────────────────────────────
async function loadStats() {
  const res = await fetch(`/api/admin/stats?password=${encodeURIComponent(adminPw)}`);
  if (!res.ok) return;
  const d = await res.json();

  const pct = d.total > 0 ? Math.round(d.completed / d.total * 100) : 0;
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="val">${d.total}</div><div class="lbl">총 발송</div></div>
    <div class="stat-card"><div class="val green">${d.completed}</div><div class="lbl">완료</div></div>
    <div class="stat-card"><div class="val amber">${d.pending}</div><div class="lbl">미완료</div></div>
    <div class="stat-card"><div class="val" style="color:#06b6d4">${pct}%</div><div class="lbl">완료율</div></div>
  `;

  drawChart('trendChart', 'line', {
    labels: d.trend.map(t => t.date),
    datasets: [{ label: '발송 수', data: d.trend.map(t => t.count),
      borderColor: '#3b82f6', backgroundColor: '#3b82f620', fill: true, tension: 0.3 }]
  });
  drawChart('schoolChart', 'bar', {
    labels: d.bySchool.map(x => x.school),
    datasets: [{ label: '발송 수', data: d.bySchool.map(x => x.count), backgroundColor: CHART_COLORS }]
  });
}

function drawChart(id, type, data) {
  if (chartInstances[id]) chartInstances[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type, data,
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } } },
      scales: (type === 'bar' || type === 'line') ? {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true }
      } : undefined
    }
  });
}

// ── 설문 발송 ─────────────────────────────────────────────────
function toggleSendTo() {
  const via = document.getElementById('sendVia').value;
  const label = document.getElementById('sentToLabel');
  const input = document.getElementById('sendTo');
  const hint = document.getElementById('sendToHint');
  if (via === 'email') {
    label.textContent = '이메일 주소 *';
    input.type = 'email';
    input.placeholder = 'teacher@school.ac.kr';
    hint.textContent = '';
  } else {
    label.textContent = '연락처 (메모용)';
    input.type = 'tel';
    input.placeholder = '010-0000-0000';
    hint.textContent = '링크가 생성되면 직접 문자로 전달해 주세요.';
  }
}

async function sendSurvey() {
  const errEl = document.getElementById('sendErr');
  const resultEl = document.getElementById('sendResult');
  errEl.classList.remove('show');
  resultEl.style.display = 'none';

  const name = document.getElementById('sendName').value.trim();
  const school = document.getElementById('sendSchool').value.trim();
  const grade = document.getElementById('sendGrade').value.trim();
  const via = document.getElementById('sendVia').value;
  const to = document.getElementById('sendTo').value.trim();

  if (!name || !school || !grade || !to) {
    errEl.textContent = '모든 항목을 입력해 주세요.';
    errEl.classList.add('show');
    return;
  }

  const res = await fetch('/api/admin/send', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: adminPw, teacherName: name, school, grade, sentTo: to, sentVia: via })
  });
  const data = await res.json();

  if (data.success) {
    currentSendLink = data.surveyUrl;
    document.getElementById('sendResultMsg').textContent =
      via === 'email' ? '✅ 이메일이 발송되었습니다.' : '✅ 설문 링크가 생성되었습니다.';
    document.getElementById('sendLink').textContent = data.surveyUrl;
    resultEl.style.display = 'block';
    loadTokens();
  } else {
    errEl.textContent = data.error || '발송에 실패했습니다.';
    errEl.classList.add('show');
  }
}

function copyLink() {
  navigator.clipboard.writeText(currentSendLink).then(() => alert('링크가 복사되었습니다.'));
}

// ── 발송 목록 ─────────────────────────────────────────────────
async function loadTokens() {
  const res = await fetch(`/api/admin/tokens?password=${encodeURIComponent(adminPw)}`);
  if (!res.ok) return;
  const tokens = await res.json();

  if (!tokens.length) {
    document.getElementById('tokenTbl').innerHTML = '<div class="loading">발송된 설문이 없습니다.</div>';
    return;
  }

  const baseUrl = window.location.origin;
  let html = `<table class="data-tbl"><thead><tr>
    <th>선생님</th><th>학교</th><th>학급</th><th>발송처</th><th>방법</th><th>상태</th>
    <th>발송일</th><th>완료일</th><th>작업</th>
  </tr></thead><tbody>`;

  for (const t of tokens) {
    const sentDate = new Date(t.created_at).toLocaleDateString('ko-KR');
    const doneDate = t.completed_at ? new Date(t.completed_at).toLocaleDateString('ko-KR') : '-';
    const viaLabel = t.sent_via === 'email' ? '<span class="badge badge-blue">이메일</span>' : '<span class="badge badge-pink">문자</span>';
    const statusLabel = t.completed
      ? '<span class="badge badge-green">완료</span>'
      : '<span class="badge badge-amber">미완료</span>';
    const surveyUrl = `${baseUrl}/survey/${t.id}`;

    html += `<tr>
      <td>${t.teacher_name}</td>
      <td>${t.school}</td>
      <td>${t.grade}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${t.sent_to}</td>
      <td>${viaLabel}</td>
      <td>${statusLabel}</td>
      <td>${sentDate}</td>
      <td>${doneDate}</td>
      <td style="white-space:nowrap">
        ${t.completed ? `<button class="btn btn-primary btn-sm" onclick="viewResult('${t.id}','${t.teacher_name}','${t.school} ${t.grade}')">결과보기</button> ` : ''}
        <button class="btn btn-gray btn-sm" onclick="navigator.clipboard.writeText('${surveyUrl}').then(()=>alert('복사됨'))">링크복사</button>
        <button class="btn btn-red btn-sm" onclick="deleteToken('${t.id}')">삭제</button>
      </td>
    </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('tokenTbl').innerHTML = html;
}

async function deleteToken(id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  await fetch(`/api/admin/tokens/${id}?password=${encodeURIComponent(adminPw)}`, { method: 'DELETE' });
  loadTokens();
}

// ── 결과 상세 ─────────────────────────────────────────────────
async function viewResult(id, name, sub) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  const overlay = document.getElementById('resultOverlay');
  overlay.style.display = 'block';
  document.getElementById('resultTitle').textContent = `${name} 선생님 결과`;
  document.getElementById('resultSubtitle').textContent = sub;
  document.getElementById('resultContent').innerHTML = '<div class="loading">불러오는 중...</div>';

  const res = await fetch(`/api/admin/results/${id}?password=${encodeURIComponent(adminPw)}`);
  const data = await res.json();
  renderResult(data);
}

function closeResult() {
  document.getElementById('resultOverlay').style.display = 'none';
  showTab('tokens');
}

let activeChildTab = 0;
let currentResultData = null;

function renderResult(data) {
  currentResultData = data;
  activeChildTab = 0;

  const responses = data.responses;
  function getResp(idx) { return responses.find(r => r.child_index === idx); }

  // 요약 카드
  let summaryHtml = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">';
  for (let i = 0; i < 4; i++) {
    const r = getResp(i);
    const avg = r ? calcAvg(r.answers) : null;
    const isGirl = i >= 2;
    summaryHtml += `
      <div style="background:#0f172a;border-radius:10px;padding:16px;text-align:center;flex:1;min-width:120px;
        border-top:3px solid ${isGirl ? '#ec4899' : '#3b82f6'}">
        <div style="font-size:12px;color:${isGirl ? '#ec4899' : '#3b82f6'};font-weight:600;margin-bottom:4px">${CHILD_LABELS[i]}</div>
        <div style="font-size:15px;font-weight:700;color:#f1f5f9">${r ? r.child_name : '-'}</div>
        <div style="font-size:11px;color:#64748b">${r ? r.age : ''}</div>
        <div style="font-size:24px;font-weight:700;color:#3b82f6;margin-top:8px">${avg !== null ? avg : '-'}</div>
        <div style="font-size:11px;color:#64748b">평균점수</div>
      </div>`;
  }
  summaryHtml += '</div>';

  // 자식 탭
  const tabsHtml = `<div class="child-tabs">${[0,1,2,3].map(i => `
    <button class="child-tab-btn ${i===0?'active':''}" id="ctab${i}" onclick="switchChildTab(${i})">${CHILD_LABELS[i]}${getResp(i)?' ✓':''}</button>
  `).join('')}</div>`;

  // 각 자식 패널
  let panelsHtml = '';
  for (let i = 0; i < 4; i++) {
    const r = getResp(i);
    let panel = `<div id="cpanel${i}" style="display:${i===0?'block':'none'}">`;
    if (!r) {
      panel += '<div class="loading">응답 없음</div>';
    } else {
      const ans = typeof r.answers === 'string' ? JSON.parse(r.answers) : r.answers;
      panel += `
        <div style="display:flex;gap:16px;flex-wrap:wrap;background:#0f172a;border-radius:8px;padding:14px;margin-bottom:16px">
          <div><div style="font-size:11px;color:#64748b">이름</div><div style="font-weight:700">${r.child_name}</div></div>
          <div><div style="font-size:11px;color:#64748b">성별</div><div style="font-weight:700">${r.gender}아</div></div>
          <div><div style="font-size:11px;color:#64748b">연령</div><div style="font-weight:700">${r.age}</div></div>
          <div><div style="font-size:11px;color:#64748b">평균점수</div><div style="font-weight:700;color:#3b82f6">${calcAvg(ans)}점</div></div>
        </div>
        <div style="overflow-x:auto"><table class="result-tbl">
          <thead><tr><th style="width:40px">NO</th><th class="q-th">문항</th><th style="width:60px">점수</th><th style="width:200px">분포</th></tr></thead>
          <tbody>`;
      QUESTIONS.forEach((q, qi) => {
        const v = ans[String(qi)] || 0;
        const pct = Math.round(v / 5 * 100);
        const color = v >= 4 ? '#22c55e' : v === 3 ? '#f59e0b' : v > 0 ? '#ef4444' : '#475569';
        panel += `<tr>
          <td>${qi+1}</td>
          <td class="q-td" style="font-size:12px">${q}</td>
          <td style="color:${color};font-weight:700">${v || '-'}</td>
          <td><div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div></td>
        </tr>`;
      });
      panel += '</tbody></table></div>';
    }
    panel += '</div>';
    panelsHtml += panel;
  }

  document.getElementById('resultContent').innerHTML = summaryHtml + tabsHtml + panelsHtml;
}

function switchChildTab(idx) {
  activeChildTab = idx;
  for (let i = 0; i < 4; i++) {
    document.getElementById(`ctab${i}`)?.classList.toggle('active', i === idx);
    const p = document.getElementById(`cpanel${i}`);
    if (p) p.style.display = i === idx ? 'block' : 'none';
  }
}

function calcAvg(answers) {
  const ans = typeof answers === 'string' ? JSON.parse(answers) : answers;
  const vals = Object.values(ans).map(Number).filter(v => v > 0);
  if (!vals.length) return 0;
  return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
}

// ── CSV 내보내기 ──────────────────────────────────────────────
function exportCSV() {
  window.location.href = `/api/admin/export?password=${encodeURIComponent(adminPw)}`;
}
</script>
